<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Welcome to goilerplate</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        line-height: 1.6;
        color: #333;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
      }
      .header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 30px;
        text-align: center;
        border-radius: 10px 10px 0 0;
      }
      .content {
        background: #f9f9f9;
        padding: 30px;
        border-radius: 0 0 10px 10px;
      }
      .button {
        display: inline-block;
        background-color: #667eea;
        color: white;
        padding: 15px 30px;
        text-decoration: none;
        border-radius: 5px;
        margin: 20px 0;
      }
      a.button,
      a.button:hover,
      a.button:visited {
        color: white;
      }
      .footer {
        text-align: center;
        margin-top: 30px;
        color: #666;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>🎉 Account Verified!</h1>
      </div>
      <div class="content">
        <h2>Welcome {{.FirstName}}!</h2>
        <p>Your account has been successfully verified! You're now ready!</p>

        <a href="{{.BaseURL}}" class="button">Go to Dashboard</a>
      </div>
      <div class="footer">
        <p>Thank you! ❤️</p>
      </div>
    </div>
  </body>
</html>
