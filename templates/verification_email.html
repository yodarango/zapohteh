<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Verify Your Account</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        line-height: 1.6;
        color: #333;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
      }
      .header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 30px;
        text-align: center;
        border-radius: 10px 10px 0 0;
      }
      .content {
        background: #f9f9f9;
        padding: 30px;
        border-radius: 0 0 10px 10px;
      }
      .button {
        display: block;
        color: #667eea;
        margin: 20px 0;
      }
      a.button,
      a.button:hover,
      a.button:visited {
        color: #667eea;
      }

      .footer {
        text-align: center;
        margin-top: 30px;
        color: #666;
        font-size: 14px;
      }

      .fs-code {
        background-color: #667eea;
        color: white;
        font-size: 3rem;
        font-weight: bold;
        margin: 20px auto;
        padding: 16px;
        border-radius: 10px;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>👋 Welcome!</h1>
      </div>
      <div class="content">
        <h2>Hi {{.FirstName}}!</h2>
        <p>
          Thank you for signing up! To complete your registration please verify
          your email address by entering the code below.
        </p>

        <p class="fs-code">{{.VerificationCode}}</p>

        <a href="{{.BaseURL}}" class="button">Verify My Account</a>

        <p>
          If you didn't create an account, you can safely ignore this email.
        </p>
      </div>
      <div class="footer">
        <p>Happy building! ❤️</p>
      </div>
    </div>
  </body>
</html>
